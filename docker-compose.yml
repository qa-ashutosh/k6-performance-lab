services:
  quickpizza:
    image: ghcr.io/grafana/quickpizza-local:latest
    container_name: quickpizza
    ports:
      - "3333:3333"
    networks:
      - k6net

  influxdb:
    image: influxdb:1.11
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    networks:
      - k6net

  grafana:
    # Pinned to 8.5.21 — latest Grafana (v10+) removed the 'graph' panel type
    # which breaks auto-provisioned k6 dashboards using InfluxDB v1
    image: grafana/grafana:8.5.21
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_BASIC_ENABLED=false
    volumes:
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./dashboards:/var/lib/grafana/dashboards
    depends_on:
      - influxdb
    networks:
      - k6net

networks:
  k6net:
    driver: bridge
