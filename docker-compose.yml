version: "3.8"

services:
  quickpizza:
    image: ghcr.io/grafana/quickpizza-local:latest
    container_name: quickpizza
    ports:
      - "3333:3333"
    networks:
      - k6net

  influxdb:
    image: influxdb:1.11
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    networks:
      - k6net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - influxdb
    networks:
      - k6net

networks:
  k6net:
    driver: bridge
