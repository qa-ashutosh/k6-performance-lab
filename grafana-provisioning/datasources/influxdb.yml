# grafana-provisioning/datasources/influxdb.yml
# Auto-provisions InfluxDB as a datasource in Grafana on startup.
# No manual setup needed — just run docker compose up.

apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: k6
    isDefault: true
    editable: true
