# grafana-provisioning/datasources/influxdb.yml
# Auto-provisions InfluxDB as datasource on Grafana startup.
# Name MUST match the datasource name in k6-dashboard.json exactly.

apiVersion: 1

datasources:
  - name: k6
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: k6
    isDefault: true
    editable: true
    jsonData:
      httpMode: GET
